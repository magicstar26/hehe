<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD Widiyah</title>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            color: white;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; text-align: center;
        }
        .container { padding: 20px; z-index: 2; }
        h1 { font-size: 2.2rem; text-shadow: 0 0 15px #e94560; margin-bottom: 5px; }
        
        /* Area Foto */
        .photo-container {
            width: 180px; height: 180px;
            margin: 20px auto;
            border-radius: 50%;
            border: 4px solid #e94560;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }
        .photo-container img { width: 100%; height: 100%; object-fit: cover; }

        .btn-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 12px; max-width: 350px; margin-top: 25px;
        }
        button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; padding: 15px 10px;
            border-radius: 12px; cursor: pointer;
            backdrop-filter: blur(5px); transition: 0.3s;
        }
        button:hover { background: #e94560; transform: translateY(-3px); }

        /* Popup */
        #popup {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white; color: #333;
            padding: 25px; border-radius: 20px;
            width: 80%; max-width: 300px; z-index: 10;
        }
        #overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Happy Birthday, Widiyah! 🎂</h1>
        <p>Klik tombol di bawah untuk pesan dariku:</p>

        <div class="photo-container">
            <img src="foto_widiyah.jpg" alt="Widiyah" onerror="this.src='https://via.placeholder.com/150'">
        </div>

        <div class="btn-grid">
            <button onclick="pop('Harapan', 'Semoga tahun ini membawa banyak kebahagiaan untukmu!')">✨ Harapan</button>
            <button onclick="pop('Semangat', 'Jangan pernah berhenti bermimpi, kamu hebat!')">🚀 Semangat</button>
            <button onclick="pop('Kesehatan', 'Sehat selalu dan panjang umur ya, Widiyah!')">🍀 Sehat</button>
            <button onclick="pop('Terima Kasih', 'Makasih ya sudah jadi teman yang baik selama ini.')">❤️ Bestie</button>
        </div>
    </div>

    <div id="overlay" onclick="tutup()"></div>
    <div id="popup">
        <h3 id="p-title"></h3>
        <p id="p-msg"></p>
        <button onclick="tutup()" style="background:#e94560; width:100%">Tutup</button>
    </div>

    <script>
        function pop(t, m) {
            document.getElementById('p-title').innerText = t;
            document.getElementById('p-msg').innerText = m;
            document.getElementById('popup').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }
        function tutup() {
            document.getElementById('popup').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }
    </script>
</body>
</html>
